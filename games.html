```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nova Games</title>

<style>

:root{
  --accent:#b46bff;
  --accent2:#ff4fd8;
  --bg1:#050510;
  --bg2:#0b0b1d;
  --card:rgba(20,20,35,0.45);
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:system-ui,Arial;
  color:#f2f2f7;
  overflow-x:hidden;
  min-height:100vh;

  background:
    radial-gradient(circle at 20% 30%, rgba(180,107,255,0.30), transparent 45%),
    radial-gradient(circle at 80% 70%, rgba(124,77,255,0.22), transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05), transparent 60%),
    linear-gradient(180deg,var(--bg1),var(--bg2));
}

/* STARS */

body::after{
  content:"";
  position:fixed;
  inset:0;
  background-image:radial-gradient(white 1px, transparent 1px);
  background-size:90px 90px;
  opacity:.08;
  pointer-events:none;
}

/* ===== TOP ===== */

.top{
  padding:22px 24px 10px;

  display:flex;
  align-items:center;
  justify-content:space-between;
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo{
  width:42px;
  height:42px;
  border-radius:14px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:22px;
  font-weight:bold;
  color:white;

  background:
    linear-gradient(135deg,var(--accent),var(--accent2));

  box-shadow:
    0 0 20px rgba(180,107,255,.45);
}

.title{
  font-size:24px;
  font-weight:700;
  color:var(--accent);
}

/* ===== GLASS MENU ===== */

.menuWrap{
  display:flex;
  justify-content:center;
  margin-top:10px;
  margin-bottom:26px;
}

.menu{
  width:760px;
  max-width:92%;

  display:flex;
  align-items:center;
  justify-content:space-around;

  position:relative;

  padding:28px 18px;

  border-radius:34px;

  background:
    linear-gradient(90deg,var(--accent),var(--accent2));

  box-shadow:
    0 12px 40px rgba(0,0,0,.45);
}

.menuBtn{
  border:none;
  background:none;
  color:white;

  font-size:15px;
  font-weight:600;

  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;

  cursor:pointer;

  transition:.2s;
}

.menuBtn:hover{
  transform:translateY(-3px);
}

.menuBtn span{
  font-size:32px;
}

/* CENTER BUTTON */

.centerOrb{
  position:absolute;
  top:-38px;
  left:50%;
  transform:translateX(-50%);

  width:110px;
  height:110px;

  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;

  background:
    linear-gradient(135deg,var(--accent),var(--accent2));

  border:7px solid #0a0a18;

  box-shadow:
    0 0 35px rgba(180,107,255,.5);
}

.centerInner{
  width:84px;
  height:84px;

  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:38px;

  background:rgba(255,255,255,.12);

  backdrop-filter:blur(10px);

  color:white;
}

/* ===== GRID ===== */

.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:14px;
  padding:0 18px 24px;
}

/* ===== GAME TILE ===== */

.game{
  aspect-ratio:1/1;
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  position:relative;

  border:1px solid rgba(180,107,255,0.15);

  transition:.2s;

  background:rgba(20,20,35,0.4);

  backdrop-filter:blur(6px);
}

.game:hover{
  transform:translateY(-4px);

  border-color:var(--accent);

  box-shadow:
    0 0 20px rgba(180,107,255,0.28);
}

.game img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.label{
  position:absolute;
  bottom:0;
  left:0;
  right:0;

  padding:10px;

  font-size:13px;
  font-weight:bold;

  background:
    linear-gradient(to top, rgba(0,0,0,0.82), transparent);
}

/* ===== THEMES ===== */

.nebula{
  --accent:#b46bff;
  --accent2:#ff4fd8;
}

.aqua{
  --accent:#4dc9ff;
  --accent2:#4d7cff;
}

.crimson{
  --accent:#ff4d6d;
  --accent2:#ff8c42;
}

.lime{
  --accent:#7dff7d;
  --accent2:#00ffaa;
}

.gold{
  --accent:#ffd54d;
  --accent2:#ff9f43;
}

.velvet{
  --accent:#d66bff;
  --accent2:#ff6bd6;
}

/* ===== MOBILE ===== */

@media(max-width:1000px){

  .grid{
    grid-template-columns:repeat(4,1fr);
  }
}

@media(max-width:700px){

  .grid{
    grid-template-columns:repeat(2,1fr);
  }

  .menu{
    padding:22px 8px;
  }

  .menuBtn span{
    font-size:24px;
  }

  .centerOrb{
    width:92px;
    height:92px;
    top:-28px;
  }

  .centerInner{
    width:68px;
    height:68px;
    font-size:28px;
  }
}

</style>
</head>

<body class="nebula">

<!-- ===== TOP ===== -->

<div class="top">

  <div class="brand">
    <div class="logo">✦</div>
    <div class="title">Nova Games</div>
  </div>

</div>

<!-- ===== GLASS MENU ===== -->

<div class="menuWrap">

  <div class="menu">

    <button class="menuBtn">
      <span>🏠</span>
      Home
    </button>

    <button class="menuBtn">
      <span>🔥</span>
      Trending
    </button>

    <div class="centerOrb">
      <div class="centerInner">🎮</div>
    </div>

    <button class="menuBtn">
      <span>🕘</span>
      Recent
    </button>

    <button class="menuBtn" onclick="cycleTheme()">
      <span>🎨</span>
      Themes
    </button>

  </div>

</div>

<!-- ===== GAMES ===== -->

<div class="grid" id="grid"></div>

<script>

let games = [];
let icons = {};

const grid = document.getElementById("grid");

/* ===== THEMES ===== */

const themes = [
  "nebula",
  "aqua",
  "crimson",
  "lime",
  "gold",
  "velvet"
];

let currentTheme = 0;

function cycleTheme(){

  currentTheme++;

  if(currentTheme >= themes.length){
    currentTheme = 0;
  }

  document.body.className = themes[currentTheme];
}

/* ===== LOAD ===== */

Promise.all([
  fetch("games.json").then(r => r.json()),
  fetch("icons.json").then(r => r.json())
])
.then(([g, i]) => {

  games = g;
  icons = i;

  build();
});

/* ===== NAME ===== */

function cleanName(path){

  let parts = path.split("/");

  let name;

  if(parts[parts.length - 1] === "index.html"){
    name = parts[parts.length - 2];
  } else {
    name = parts[parts.length - 1].replace(".html", "");
  }

  return name
    .replace(/[-_]/g, " ")
    .replace(/\b\w/g, c => c.toUpperCase());
}

/* ===== BUILD ===== */

function build(){

  grid.innerHTML = "";

  games.forEach(game => {

    const tile = document.createElement("div");

    tile.className = "game";

    tile.onclick = () => {
      window.location.href = game;
    };

    const img = document.createElement("img");

    img.src = icons[game] || "";

    const label = document.createElement("div");

    label.className = "label";

    label.textContent = cleanName(game);

    tile.appendChild(img);
    tile.appendChild(label);

    grid.appendChild(tile);
  });
}

</script>

</body>
</html>
