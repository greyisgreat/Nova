<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nova Games</title>

<style>

:root{
  --accent:#b46bff;
  --accent2:#ff4fd8;
  --bg1:#050510;
  --bg2:#0b0b1d;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:system-ui,Arial;
  color:#f2f2f7;
  overflow-x:hidden;
  min-height:100vh;

  background:
    radial-gradient(circle at 20% 30%, rgba(180,107,255,.25), transparent 45%),
    radial-gradient(circle at 80% 70%, rgba(255,79,216,.18), transparent 50%),
    linear-gradient(180deg,var(--bg1),var(--bg2));
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background-image:radial-gradient(white 1px, transparent 1px);
  background-size:90px 90px;
  opacity:.05;
  pointer-events:none;
}

/* TOP */

.top{
  padding:24px;
  display:flex;
  align-items:center;
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
}

.logo{
  width:46px;
  height:46px;
  border-radius:14px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:24px;
  font-weight:bold;

  background:linear-gradient(135deg,var(--accent),var(--accent2));

  box-shadow:0 0 20px rgba(180,107,255,.4);
}

.title{
  font-size:28px;
  font-weight:700;
  color:var(--accent);
}

/* MENU */

.menuWrap{
  display:flex;
  justify-content:center;
  margin-bottom:30px;
}

.menu{
  width:820px;
  max-width:92%;

  position:relative;

  display:flex;
  justify-content:space-around;
  align-items:center;

  padding:28px 20px;

  border-radius:34px;

  background:linear-gradient(90deg,var(--accent),var(--accent2));

  box-shadow:0 14px 40px rgba(0,0,0,.45);
}

.menuBtn{
  border:none;
  background:none;
  color:white;

  cursor:pointer;

  font-size:15px;
  font-weight:700;

  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;

  transition:.2s;
}

.menuBtn:hover{
  transform:translateY(-3px);
}

.menuIcon{
  width:28px;
  height:28px;

  border-radius:50%;

  border:2px solid rgba(255,255,255,.8);
}

/* CENTER ORB */

.centerOrb{
  position:absolute;
  top:-38px;
  left:50%;
  transform:translateX(-50%);

  width:110px;
  height:110px;

  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;

  background:linear-gradient(135deg,var(--accent),var(--accent2));

  border:7px solid #090914;

  box-shadow:0 0 35px rgba(180,107,255,.5);
}

.centerInner{
  width:82px;
  height:82px;

  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;

  background:rgba(255,255,255,.12);

  font-size:34px;
  font-weight:bold;
}

/* THEMES */

.themeDropdown{
  position:absolute;
  top:115px;
  right:12px;

  width:220px;

  border-radius:18px;

  overflow:hidden;

  background:rgba(15,15,30,.95);

  backdrop-filter:blur(10px);

  border:1px solid rgba(255,255,255,.08);

  display:none;
}

.themeDropdown.active{
  display:block;
}

.themeOption{
  padding:14px 16px;
  cursor:pointer;
  transition:.15s;
}

.themeOption:hover{
  background:rgba(255,255,255,.08);
}

/* SECTION */

.sectionTitle{
  padding:0 20px;
  margin-bottom:14px;

  font-size:22px;
  font-weight:700;

  color:var(--accent);
}

/* GRID */

.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:14px;
  padding:0 20px 30px;
}

/* TILE */

.game{
  aspect-ratio:1/1;

  border-radius:18px;
  overflow:hidden;

  cursor:pointer;
  position:relative;

  background:rgba(20,20,35,.4);

  border:1px solid rgba(255,255,255,.08);

  transition:.2s;
}

.game:hover{
  transform:translateY(-4px);
  border-color:var(--accent);
  box-shadow:0 0 20px rgba(180,107,255,.3);
}

.game img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.label{
  position:absolute;
  left:0;
  right:0;
  bottom:0;

  padding:10px;

  font-size:13px;
  font-weight:700;

  background:linear-gradient(to top, rgba(0,0,0,.85), transparent);
}

/* THEMES */

.nebula{
  --accent:#b46bff;
  --accent2:#ff4fd8;
  --bg1:#050510;
  --bg2:#0b0b1d;
}

.aqua{
  --accent:#53d8ff;
  --accent2:#4d7cff;
  --bg1:#04111a;
  --bg2:#071d2b;
}

.crimson{
  --accent:#ff4d6d;
  --accent2:#ff8c42;
  --bg1:#14060b;
  --bg2:#220b14;
}

.lime{
  --accent:#7dff7d;
  --accent2:#00ffaa;
  --bg1:#07140d;
  --bg2:#0c2118;
}

.gold{
  --accent:#ffd54d;
  --accent2:#ff9f43;
  --bg1:#171005;
  --bg2:#241605;
}

.velvet{
  --accent:#d66bff;
  --accent2:#ff6bd6;
  --bg1:#120714;
  --bg2:#1c0b24;
}

@media(max-width:1000px){
  .grid{
    grid-template-columns:repeat(4,1fr);
  }
}

@media(max-width:700px){

  .grid{
    grid-template-columns:repeat(2,1fr);
  }

  .centerOrb{
    width:92px;
    height:92px;
  }

  .centerInner{
    width:66px;
    height:66px;
    font-size:28px;
  }
}

</style>
</head>

<body class="nebula">

<div class="top">

  <div class="brand">
    <div class="logo">✦</div>
    <div class="title">Nova Games</div>
  </div>

</div>

<div class="menuWrap">

  <div class="menu">

    <button class="menuBtn" onclick="showHome()">
      <div class="menuIcon"></div>
      Home
    </button>

    <button class="menuBtn" onclick="showTrending()">
      <div class="menuIcon"></div>
      Trending
    </button>

    <div class="centerOrb">
      <div class="centerInner">✦</div>
    </div>

    <button class="menuBtn" onclick="showRecent()">
      <div class="menuIcon"></div>
      Recent
    </button>

    <button class="menuBtn" onclick="toggleThemes()">
      <div class="menuIcon"></div>
      Themes
    </button>

    <div class="themeDropdown" id="themeDropdown">

      <div class="themeOption" onclick="setTheme('nebula')">Nebula Drift</div>
      <div class="themeOption" onclick="setTheme('aqua')">Aqua Pulse</div>
      <div class="themeOption" onclick="setTheme('crimson')">Crimson Orbit</div>
      <div class="themeOption" onclick="setTheme('lime')">Lime Reactor</div>
      <div class="themeOption" onclick="setTheme('gold')">Golden Nova</div>
      <div class="themeOption" onclick="setTheme('velvet')">Velvet Void</div>

    </div>

  </div>

</div>

<div class="sectionTitle" id="sectionTitle">All Games</div>

<div class="grid" id="grid"></div>

<script>

let games = [];
let icons = {};

const grid = document.getElementById("grid");
const sectionTitle = document.getElementById("sectionTitle");
const themeDropdown = document.getElementById("themeDropdown");

let recentGames = JSON.parse(localStorage.getItem("recentGames")) || [];

const trendingGames = [
  "games/Basket Random.html",
  "games/Soccer Random.html",
  "games/Volley Random.html"
];

Promise.all([
  fetch("games.json").then(r => r.json()),
  fetch("icons.json").then(r => r.json())
])
.then(([g, i]) => {

  games = g;
  icons = i;

  showHome();
});

function cleanName(path){

  let parts = path.split("/");

  let name;

  if(parts[parts.length - 1] === "index.html"){
    name = parts[parts.length - 2];
  } else {
    name = parts[parts.length - 1].replace(".html", "");
  }

  return name
    .replace(/[-_]/g, " ")
    .replace(/\b\w/g, c => c.toUpperCase());
}

function build(list){

  grid.innerHTML = "";

  list.forEach(game => {

    const tile = document.createElement("div");

    tile.className = "game";

    tile.onclick = () => launch(game);

    const img = document.createElement("img");

    img.src = icons[game] || "";

    const label = document.createElement("div");

    label.className = "label";

    label.textContent = cleanName(game);

    tile.appendChild(img);
    tile.appendChild(label);

    grid.appendChild(tile);
  });
}

function launch(game){

  recentGames = recentGames.filter(g => g !== game);

  recentGames.unshift(game);

  recentGames = recentGames.slice(0,10);

  localStorage.setItem("recentGames", JSON.stringify(recentGames));

  window.location.href = game;
}

function showHome(){
  sectionTitle.textContent = "All Games";
  build(games);
}

function showTrending(){
  sectionTitle.textContent = "Trending Games";
  build(trendingGames);
}

function showRecent(){

  sectionTitle.textContent = "Recent Games";

  if(recentGames.length === 0){
    grid.innerHTML = "";
    return;
  }

  build(recentGames);
}

function toggleThemes(){
  themeDropdown.classList.toggle("active");
}

function setTheme(theme){

  document.body.className = theme;

  localStorage.setItem("novaTheme", theme);

  themeDropdown.classList.remove("active");
}

const savedTheme = localStorage.getItem("novaTheme");

if(savedTheme){
  document.body.className = savedTheme;
}

</script>

</body>
</html>
