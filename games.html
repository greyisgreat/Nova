<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nova Games</title>

<style>
body {
  margin: 0;
  font-family: system-ui, Arial;
  color: #f2f2f7;
}

/* ===== NOVA SPACE BACKGROUND ===== */
body {
  min-height: 100vh;
  background:
    radial-gradient(circle at 20% 30%, rgba(180,107,255,0.30), transparent 45%),
    radial-gradient(circle at 80% 70%, rgba(124,77,255,0.22), transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05), transparent 60%),
    linear-gradient(180deg, #060611, #0a0a18);
}

/* subtle stars */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background-image: radial-gradient(white 1px, transparent 1px);
  background-size: 90px 90px;
  opacity: 0.08;
  pointer-events: none;
}

/* TOP BAR */
.top {
  padding: 16px;
  font-weight: bold;
  color: #b46bff;
  border-bottom: 1px solid rgba(180,107,255,0.25);
}

/* ===== GRID (5 PER ROW) ===== */
.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 14px;
  padding: 16px;
}

/* ===== SQUARE TILE ===== */
.game {
  aspect-ratio: 1 / 1;
  border-radius: 14px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
  border: 1px solid rgba(180,107,255,0.15);
  transition: 0.2s;
  background: rgba(20,20,35,0.4);
}

.game:hover {
  transform: translateY(-4px);
  border-color: #b46bff;
  box-shadow: 0 0 18px rgba(180,107,255,0.25);
}

/* IMAGE */
.game img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* LABEL */
.label {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 8px;
  background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
  font-weight: bold;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="top">✦ Nova Games</div>

<div class="grid" id="grid"></div>

<script>
let games = [];
let icons = {};

const grid = document.getElementById("grid");

/* LOAD JSON */
Promise.all([
  fetch("games.json").then(r => r.json()),
  fetch("icons.json").then(r => r.json())
])
.then(([g, i]) => {
  games = g;
  icons = i;
  build();
});

/* CLEAN NAME */
function cleanName(path) {
  return path.split("/").pop()
    .replace(".html", "")
    .replace(/[-_]/g, " ")
    .replace(/\b\w/g, c => c.toUpperCase());
}

/* BUILD GRID */
function build() {
  grid.innerHTML = "";

  games.forEach(game => {

    const tile = document.createElement("div");
    tile.className = "game";
    tile.onclick = () => window.location.href = game;

    const img = document.createElement("img");
    img.src = icons[game] || "";

    const label = document.createElement("div");
    label.className = "label";
    label.textContent = cleanName(game);

    tile.appendChild(img);
    tile.appendChild(label);

    grid.appendChild(tile);
  });
}
</script>

</body>
</html>
